<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Академия чемпионов</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242838;
  --card: #1e2235;
  --border: #2d3250;
  --accent: #4ade80;
  --accent2: #22c55e;
  --gold: #f59e0b;
  --blue: #60a5fa;
  --orange: #fb923c;
  --red: #f87171;
  --purple: #a78bfa;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --sport: #4ade80;
  --study: #60a5fa;
  --art: #a78bfa;
  --health: #f87171;
  --home: #fb923c;
  --read: #f59e0b;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0f4ff;
    --bg2: #e8edf8;
    --bg3: #dde4f4;
    --card: #ffffff;
    --border: #c7d0e8;
    --text: #1e2235;
    --text2: #4a5568;
    --text3: #9ca3af;
    --shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
}
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-logo { font-size: 22px; }
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.header-title small { display: block; font-size: 11px; font-weight: 400; color: var(--text2); }
.badge-parent { background: var(--gold); color: #000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
.btn-icon { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 16px; transition: background .15s; }
.btn-icon:hover { background: var(--border); }
.profile-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.profile-bar::-webkit-scrollbar { display: none; }
.profile-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; border: 2px solid var(--border); background: var(--bg3); cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 600; transition: all .15s; flex-shrink: 0; }
.profile-chip.active { border-color: var(--accent); background: rgba(74,222,128,.12); color: var(--accent); }
.profile-chip .avatar { font-size: 18px; }
.profile-chip.add-chip { border-style: dashed; color: var(--text2); }
.tab-bar { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 11px 4px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.content { padding: 16px; padding-bottom: 24px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
.hero-card { background: linear-gradient(135deg,#1a2740 0%,#0d1f35 100%); border: 1px solid #2d4a6b; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
.hero-card::before { content: '⚽'; position: absolute; right: -10px; top: -10px; font-size: 80px; opacity: .08; transform: rotate(-15deg); }
.hero-name { font-size: 20px; font-weight: 800; }
.hero-level { font-size: 12px; color: var(--gold); font-weight: 600; margin-top: 2px; }
.hero-pts { display: flex; align-items: baseline; gap: 4px; margin: 10px 0 6px; }
.hero-pts-num { font-size: 36px; font-weight: 900; color: var(--accent); }
.hero-pts-label { font-size: 13px; color: var(--text2); }
.level-bar-wrap { margin-top: 8px; }
.level-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.bar-track { height: 6px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg,var(--accent2),var(--accent)); transition: width .4s ease; }
.metrics-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.metric-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; }
.metric-num { font-size: 22px; font-weight: 800; }
.metric-label { font-size: 10px; color: var(--text2); margin-top: 2px; }
.task-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.task-item:last-child { border-bottom: none; }
.task-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.task-pts { font-size: 13px; font-weight: 700; color: var(--gold); white-space: nowrap; }
.task-status { font-size: 12px; padding: 3px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
.status-pending { background: rgba(251,146,60,.15); color: var(--orange); }
.status-confirmed { background: rgba(74,222,128,.15); color: var(--accent); }
.btn-check { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.btn-check:hover { border-color: var(--accent); background: rgba(74,222,128,.1); }
.btn-check.done { border-color: var(--accent); background: var(--accent); color: #000; }
.btn-check.confirmed { border-color: var(--accent2); background: var(--accent2); color: #000; cursor: default; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
.btn-danger:hover { background: rgba(248,113,113,.25); }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: #d97706; }
.btn-blue { background: var(--blue); color: #000; }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-block { width: 100%; justify-content: center; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .5px; }
.form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
.form-input:focus { border-color: var(--accent); }
.form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; appearance: none; cursor: pointer; }
.pts-options { display: flex; gap: 6px; }
.pts-opt { flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--bg3); color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s; }
.pts-opt.selected { border-color: var(--gold); color: var(--gold); background: rgba(245,158,11,.1); }
/* Day picker */
.day-picker { display: flex; gap: 6px; margin-bottom: 8px; }
.day-pick-btn { flex: 1; padding: 8px 4px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s; }
.day-pick-btn.selected { border-color: var(--blue); color: var(--blue); background: rgba(96,165,250,.1); }
.day-quick-btns { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.day-quick-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.day-quick-btn:hover { border-color: var(--blue); color: var(--blue); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px 16px 30px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-title { font-size: 18px; font-weight: 800; }
.modal-close { background: var(--bg3); border: none; color: var(--text2); font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.pin-display { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
.pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: all .15s; }
.pin-dot.filled { background: var(--gold); border-color: var(--gold); }
.pin-keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 280px; margin: 0 auto; }
.pin-key { padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 20px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s; }
.pin-key:hover { background: var(--border); }
.pin-key:active { transform: scale(.95); }
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.day-cell { aspect-ratio: 1; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--bg3); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
.day-cell:hover { border-color: var(--blue); }
.day-cell.today { border-color: var(--blue); }
.day-cell.has-tasks { background: rgba(96,165,250,.1); }
.day-cell.confirmed { background: rgba(74,222,128,.15); border-color: var(--accent); }
.day-cell.pending { border-color: var(--orange); }
.day-label { font-size: 9px; color: var(--text2); font-weight: 700; text-transform: uppercase; }
.day-num { font-size: 14px; font-weight: 800; }
.day-indicator { font-size: 10px; margin-top: 1px; }
.chart-wrap { width: 100%; overflow: hidden; }
.chart-wrap svg { width: 100%; height: auto; display: block; }
.cat-progress-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.cat-icon { font-size: 18px; width: 28px; text-align: center; }
.cat-name { font-size: 12px; font-weight: 600; width: 70px; color: var(--text2); }
.cat-bar-wrap { flex: 1; }
.cat-bar-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.cat-pts { font-size: 12px; font-weight: 700; width: 36px; text-align: right; }
.level-card { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.level-card:last-child { border-bottom: none; }
.level-icon { font-size: 28px; width: 36px; text-align: center; }
.level-info { flex: 1; }
.level-name { font-size: 14px; font-weight: 700; }
.level-req { font-size: 11px; color: var(--text2); }
.badges-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg3); text-align: center; }
.badge-item.locked { opacity: .4; filter: grayscale(1); }
.badge-icon { font-size: 24px; }
.badge-name { font-size: 9px; color: var(--text2); font-weight: 600; line-height: 1.2; }
.prize-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.prize-item:last-child { border-bottom: none; }
.prize-info { flex: 1; }
.prize-name { font-size: 14px; font-weight: 700; }
.prize-pts { font-size: 12px; color: var(--text2); }
.prize-status { font-size: 11px; font-weight: 700; }
.status-avail { color: var(--accent); }
.status-not { color: var(--text3); }
/* Reward types */
.reward-type-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.reward-type-header { display: flex; align-items: center; gap: 10px; }
.reward-type-icon { font-size: 24px; }
.reward-type-info { flex: 1; }
.reward-type-name { font-size: 14px; font-weight: 700; }
.reward-type-rate { font-size: 12px; color: var(--text2); }
.reward-type-avail { font-size: 13px; font-weight: 800; color: var(--accent); }
.exchange-log-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.exchange-log-item:last-child { border-bottom: none; }
/* Child overview */
.child-overview-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .15s; }
.child-overview-card:hover { border-color: var(--accent); }
.child-ov-avatar { font-size: 36px; }
.child-ov-info { flex: 1; }
.child-ov-name { font-size: 16px; font-weight: 800; }
.child-ov-level { font-size: 11px; color: var(--gold); }
.child-ov-stats { display: flex; gap: 12px; margin-top: 4px; }
.child-ov-stat { font-size: 11px; color: var(--text2); }
.child-ov-stat strong { color: var(--text); }
.pending-badge { background: var(--orange); color: #000; font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 20px; }
.empty { text-align: center; padding: 32px 16px; color: var(--text2); }
.empty-icon { font-size: 48px; margin-bottom: 8px; }
.empty-text { font-size: 14px; }
.trend-card { border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 10px; }
.trend-up { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.3); }
.trend-down { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); }
.trend-same { background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.3); }
.trend-icon { font-size: 28px; }
.trend-text { font-size: 13px; font-weight: 600; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 13px; font-weight: 600; z-index: 200; box-shadow: var(--shadow); animation: toastIn .25s ease; white-space: nowrap; }
@keyframes toastIn { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
.emoji-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; max-height: 200px; overflow-y: auto; }
.emoji-opt { font-size: 28px; padding: 6px; border-radius: 8px; cursor: pointer; text-align: center; border: 2px solid transparent; transition: all .1s; }
.emoji-opt:hover { background: var(--bg3); }
.emoji-opt.selected { border-color: var(--accent); background: rgba(74,222,128,.1); }
.confirm-task-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.confirm-task-item:last-child { border-bottom: none; }
.divider { height: 1px; background: var(--border); margin: 12px 0; }
.text-muted { color: var(--text2); }
.text-accent { color: var(--accent); }
.text-gold { color: var(--gold); }
.text-orange { color: var(--orange); }
.text-red { color: var(--red); }
.fw-bold { font-weight: 700; }
.flex-row { display: flex; gap: 8px; }
.mt-8 { margin-top: 8px; }
.mb-8 { margin-bottom: 8px; }
.icon-row { display: flex; gap: 6px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'champions_academy_v2';

const LEVELS = [
  { name: 'Новичок',       icon: '🌱', min: 0,   max: 49   },
  { name: 'Игрок команды', icon: '👟', min: 50,  max: 149  },
  { name: 'Капитан',       icon: '🎖️', min: 150, max: 299  },
  { name: 'Звезда лиги',  icon: '⭐', min: 300,  max: 499  },
  { name: 'Чемпион',       icon: '🏆', min: 500, max: 799  },
  { name: 'Легенда',       icon: '👑', min: 800, max: Infinity },
];

const CATEGORIES = {
  sport:  { label: 'Спорт',      icon: '⚽', color: 'var(--sport)' },
  study:  { label: 'Учёба',      icon: '📚', color: 'var(--study)' },
  art:    { label: 'Творчество', icon: '🎨', color: 'var(--art)'   },
  health: { label: 'Здоровье',   icon: '💪', color: 'var(--health)'},
  home:   { label: 'Дом',        icon: '🏠', color: 'var(--home)'  },
  read:   { label: 'Чтение',     icon: '📖', color: 'var(--read)'  },
};

const BADGE_DEFS = [
  { id: 'first_task', icon: '🎯', name: 'Первый шаг',   check: c => totalConfirmed(c) >= 1 },
  { id: 'sport_5',    icon: '⚽', name: '5 тренировок', check: c => confirmedByCat(c,'sport') >= 5 },
  { id: 'pts_100',    icon: '💯', name: '100 очков',    check: c => totalEarned(c) >= 100 },
  { id: 'pts_500',    icon: '🏆', name: '500 очков',    check: c => totalEarned(c) >= 500 },
  { id: 'read_5',     icon: '📖', name: '5 читок',      check: c => confirmedByCat(c,'read') >= 5 },
  { id: 'tasks_10',   icon: '🔥', name: '10 заданий',   check: c => totalConfirmed(c) >= 10 },
  { id: 'study_5',    icon: '📚', name: '5 уроков',     check: c => confirmedByCat(c,'study') >= 5 },
  { id: 'legend',     icon: '👑', name: 'Легенда',      check: c => totalEarned(c) >= 800 },
];

const AVATARS = ['⚽','🏆','🎯','👟','🥇','🦁','🐯','🦅','🚀','⭐','🔥','💎','🏅','🎖️','👑','🦸'];
const DAY_NAMES = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const ALL_DAYS   = [0,1,2,3,4,5,6];
const WEEKDAYS   = [0,1,2,3,4];
const WEEKENDS   = [5,6];

const DEFAULT_REWARD_TYPES = [
  { id: 1, name: 'Деньги',          icon: '💰', unit: 'тенге',   rate: 10  },
  { id: 2, name: 'Минуты гаджетов', icon: '📱', unit: 'мин',     rate: 1   },
  { id: 3, name: 'Сладости',        icon: '🍬', unit: 'порция',  rate: 50  },
  { id: 4, name: 'Поход в кино',    icon: '🎬', unit: 'поход',   rate: 300 },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const DEFAULT_STATE = {
  parentMode: false,
  parentPin: '1234',
  activeChild: 0,
  rewardTypes: JSON.parse(JSON.stringify(DEFAULT_REWARD_TYPES)),
  children: [{
    id: 1,
    name: 'Алибек',
    avatar: '⚽',
    tasks: [],
    confirmedDays: {},
    weekPts: [0,0,0,0,0,0,0],
    individualPrizes: [],
    exchanges: [],
  }],
  sharedPrizes: [
    { id: 1, pts: 100, name: 'Кино с семьёй' },
    { id: 2, pts: 200, name: 'Поход в боулинг' },
    { id: 3, pts: 500, name: 'Новая форма' },
  ],
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      // migrate old v1 data
      if (!s.rewardTypes) s.rewardTypes = JSON.parse(JSON.stringify(DEFAULT_REWARD_TYPES));
      (s.children||[]).forEach(c => {
        if (!c.exchanges) c.exchanges = [];
        // migrate old task format (single weekDay + repeat → weekDays array)
        (c.tasks||[]).forEach(t => {
          if (!t.weekDays) {
            if (t.repeat === 'daily') t.weekDays = [...ALL_DAYS];
            else t.weekDays = [t.weekDay ?? 0];
          }
        });
      });
      return s;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function activeChild() { return state.children[state.activeChild] || state.children[0]; }

function totalEarned(child) { return (child.weekPts||[]).reduce((a,b)=>a+b,0); }

function totalSpent(child) { return (child.exchanges||[]).reduce((a,b)=>a+b.pts,0); }

function availablePts(child) { return Math.max(0, totalEarned(child) - totalSpent(child)); }

function totalConfirmed(child) { return (child.tasks||[]).filter(t=>t.confirmed).length; }

function confirmedByCat(child, cat) { return (child.tasks||[]).filter(t=>t.confirmed && t.cat===cat).length; }

function getLevel(pts) {
  for (let i = LEVELS.length-1; i >= 0; i--) { if (pts >= LEVELS[i].min) return i; }
  return 0;
}

function getLevelProgress(pts) {
  const idx = getLevel(pts);
  if (idx === LEVELS.length-1) return 100;
  const lv = LEVELS[idx];
  return Math.min(100, Math.round(((pts - lv.min) / (lv.max - lv.min + 1)) * 100));
}

function getTodayIdx() { const d = new Date().getDay(); return d===0?6:d-1; }

function pendingCount(child) { return (child.tasks||[]).filter(t=>t.markedDone&&!t.confirmed).length; }

function newId() { return Date.now() + Math.floor(Math.random()*1000); }

function catColor(cat) { return CATEGORIES[cat]?.color || 'var(--text2)'; }
function catIcon(cat)  { return CATEGORIES[cat]?.icon  || '•'; }
function catLabel(cat) { return CATEGORIES[cat]?.label || cat; }

function fmtDays(weekDays) {
  if (!weekDays || weekDays.length === 0) return '—';
  const s = [...weekDays].sort();
  if (s.length === 7) return '🔄 каждый день';
  if (JSON.stringify(s) === JSON.stringify(WEEKDAYS)) return '📅 будни';
  if (JSON.stringify(s) === JSON.stringify(WEEKENDS)) return '🏖️ выходные';
  return s.map(i => DAY_NAMES[i]).join(', ');
}

function rewardTypeById(id) { return (state.rewardTypes||[]).find(r=>r.id===id); }

// ═══════════════════════════════════════════════════
// UI STATE
// ═══════════════════════════════════════════════════
let ui = {
  tab: 'today',
  modal: null,
  selectedDay: null,
  pinInput: '',
  pinError: false,
  parentView: 'overview',
  addTaskForm: { title:'', cat:'sport', pts:10, weekDays:[...ALL_DAYS] },
  addPrizeForm: { name:'', pts:100, type:'points' },
  addChildForm: { name:'', avatar:'⚽' },
  editChildForm: { id:null, name:'', avatar:'⚽' },
  addRewardTypeForm: { name:'', icon:'💰', unit:'тенге', rate:10 },
  editRewardTypeForm: null,
  exchangeForm: { rewardTypeId:null, pts:100 },
  editPrizeType: 'shared',
  deleteChildId: null,
};

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  document.getElementById('app').innerHTML = buildApp();
}

function buildApp() {
  const child = activeChild();
  const pts = totalEarned(child);
  const lvIdx = getLevel(pts);
  const lv = LEVELS[lvIdx];
  let body = ui.tab === 'parent' ? buildParentView() : buildChildView(child, pts, lv, lvIdx);
  return buildHeader(lv) + buildProfileBar() + buildTabBar() +
    `<div class="content">${body}</div>` + buildModal();
}

// ─── HEADER ───
function buildHeader(lv) {
  const badge = state.parentMode ? `<span class="badge-parent">👨‍💼 Родитель</span>` : '';
  return `<div class="header">
    <span class="header-logo">🏆</span>
    <div class="header-title">Академия чемпионов<small>${lv.icon} ${lv.name}</small></div>
    ${badge}
    <button class="btn-icon" onclick="openPin()">⚙️</button>
  </div>`;
}

// ─── PROFILE BAR ───
function buildProfileBar() {
  const chips = state.children.map((c,i) => {
    const active = i === state.activeChild;
    const editBtn = state.parentMode
      ? `<span onclick="event.stopPropagation();openEditChild(${i})" style="font-size:12px;opacity:.7">✏️</span>` : '';
    return `<div class="profile-chip ${active?'active':''}" onclick="switchChild(${i})">
      <span class="avatar">${c.avatar}</span><span>${c.name}</span>${editBtn}
    </div>`;
  }).join('');
  const addBtn = state.parentMode
    ? `<div class="profile-chip add-chip" onclick="openAddChild()">➕ Добавить</div>` : '';
  return `<div class="profile-bar">${chips}${addBtn}</div>`;
}

// ─── TAB BAR ───
function buildTabBar() {
  const parentTab = state.parentMode
    ? `<div class="tab ${ui.tab==='parent'?'active':''}" onclick="setTab('parent')">👨‍💼</div>` : '';
  return `<div class="tab-bar">
    <div class="tab ${ui.tab==='today'?'active':''}"    onclick="setTab('today')">📋 Сегодня</div>
    <div class="tab ${ui.tab==='progress'?'active':''}" onclick="setTab('progress')">📈 Прогресс</div>
    <div class="tab ${ui.tab==='rewards'?'active':''}"  onclick="setTab('rewards')">🎁 Награды</div>
    <div class="tab ${ui.tab==='exchange'?'active':''}" onclick="setTab('exchange')">💰 Обмен</div>
    ${parentTab}
  </div>`;
}

// ═══════════════════════════════════════════════════
// CHILD VIEWS
// ═══════════════════════════════════════════════════
function buildChildView(child, pts, lv, lvIdx) {
  if (ui.tab === 'today')    return buildToday(child, pts, lv, lvIdx);
  if (ui.tab === 'progress') return buildProgress(child, pts);
  if (ui.tab === 'rewards')  return buildRewards(child, pts);
  if (ui.tab === 'exchange') return buildExchange(child, pts);
  return buildToday(child, pts, lv, lvIdx);
}

// ─── TODAY ───
function buildToday(child, pts, lv, lvIdx) {
  const todayIdx = getTodayIdx();
  const todayTasks = (child.tasks||[]).filter(t => (t.weekDays||[]).includes(todayIdx));
  const confirmed = todayTasks.filter(t=>t.confirmed).length;
  const pending   = todayTasks.filter(t=>t.markedDone&&!t.confirmed).length;
  const avail = availablePts(child);
  const lvPct = getLevelProgress(pts);
  const nextLv = LEVELS[Math.min(lvIdx+1, LEVELS.length-1)];

  const heroCard = `<div class="hero-card">
    <div class="hero-name">${child.avatar} ${child.name}</div>
    <div class="hero-level">${lv.icon} ${lv.name}</div>
    <div class="hero-pts">
      <span class="hero-pts-num">${avail}</span>
      <span class="hero-pts-label">доступных очков</span>
    </div>
    <div class="level-bar-wrap">
      <div class="level-bar-label"><span>До: ${nextLv.name} ${nextLv.icon}</span><span>${lvPct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${lvPct}%"></div></div>
    </div>
  </div>`;

  const metrics = `<div class="metrics-row">
    <div class="metric-card"><div class="metric-num text-accent">${confirmed}</div><div class="metric-label">Выполнено ✅</div></div>
    <div class="metric-card"><div class="metric-num">${todayTasks.length}</div><div class="metric-label">Заданий 📋</div></div>
    <div class="metric-card"><div class="metric-num text-orange">${pending}</div><div class="metric-label">Ждут ⏳</div></div>
  </div>`;

  const taskList = todayTasks.length === 0
    ? `<div class="empty"><div class="empty-icon">🗓️</div><div class="empty-text">Нет заданий на сегодня</div></div>`
    : todayTasks.map(t => buildTaskRow(t, false)).join('');

  return heroCard + metrics +
    `<div class="card"><div class="card-title">🗓️ Неделя</div>${buildWeekGrid(child)}</div>` +
    `<div class="card"><div class="card-title">📋 Задания — ${DAY_NAMES[todayIdx]}</div>${taskList}</div>` +
    `<button class="btn btn-primary btn-block mt-8" onclick="openAddTask()">➕ Добавить задание</button>`;
}

function buildWeekGrid(child) {
  const todayIdx = getTodayIdx();
  return `<div class="week-grid">${DAY_NAMES.map((name,i) => {
    const key = `w-${i}`;
    const dayTasks = (child.tasks||[]).filter(t=>(t.weekDays||[]).includes(i));
    const confirmed = child.confirmedDays[key];
    const hasPending = dayTasks.some(t=>t.markedDone&&!t.confirmed);
    let cls = 'day-cell' + (i===todayIdx?' today':'') + (confirmed?' confirmed':hasPending?' pending':dayTasks.length?' has-tasks':'');
    const ind = confirmed?'✅':hasPending?'❗':dayTasks.length?'•':'';
    return `<div class="${cls}" onclick="openDayDetail(${i})">
      <div class="day-label">${name}</div><div class="day-num">${i+1}</div><div class="day-indicator">${ind}</div>
    </div>`;
  }).join('')}</div>`;
}

function buildTaskRow(task, parentView) {
  const dot = `<div class="task-cat-dot" style="background:${catColor(task.cat)}"></div>`;
  let statusEl = '', checkEl = '';
  if (task.confirmed) {
    checkEl  = `<button class="btn-check confirmed" disabled>✓</button>`;
    statusEl = `<span class="task-status status-confirmed">✅ Засчитано</span>`;
  } else if (task.markedDone) {
    checkEl  = `<button class="btn-check done" disabled>✓</button>`;
    statusEl = `<span class="task-status status-pending">⏳ Ждёт</span>`;
  } else {
    checkEl  = `<button class="btn-check" onclick="markDone(${task.id})">○</button>`;
  }
  const deleteBtn = parentView ? `<button class="btn btn-danger btn-sm" onclick="deleteTask(${task.id})">🗑️</button>` : '';
  return `<div class="task-item">
    ${dot}
    <div class="task-info">
      <div class="task-title">${task.title}</div>
      <div class="task-meta">${catIcon(task.cat)} ${catLabel(task.cat)} · ${fmtDays(task.weekDays)}</div>
    </div>
    ${statusEl}
    <div class="task-pts">${task.pts}⚡</div>
    ${parentView ? deleteBtn : checkEl}
  </div>`;
}

// ─── PROGRESS ───
function buildProgress(child, pts) {
  const weekPts  = child.weekPts || [0,0,0,0,0,0,0];
  const lastPts  = child.lastWeekPts || [0,0,0,0,0,0,0];
  const thisTotal = weekPts.reduce((a,b)=>a+b,0);
  const lastTotal = lastPts.reduce((a,b)=>a+b,0);

  const catStats = {};
  Object.keys(CATEGORIES).forEach(k => catStats[k] = 0);
  (child.tasks||[]).filter(t=>t.confirmed).forEach(t => { catStats[t.cat] = (catStats[t.cat]||0)+t.pts; });
  const maxCat = Math.max(1, ...Object.values(catStats));

  const catRows = Object.entries(CATEGORIES).map(([k,v]) => {
    const p = Math.round((catStats[k]/maxCat)*100);
    return `<div class="cat-progress-item">
      <div class="cat-icon">${v.icon}</div>
      <div class="cat-name">${v.label}</div>
      <div class="cat-bar-wrap"><div class="cat-bar-track"><div class="bar-fill" style="width:${p}%;background:${v.color}"></div></div></div>
      <div class="cat-pts" style="color:${v.color}">${catStats[k]}</div>
    </div>`;
  }).join('');

  let trendHtml;
  if (thisTotal > lastTotal) {
    trendHtml = `<div class="trend-card trend-up"><div class="trend-icon">📈</div><div><div class="fw-bold text-accent">Отличный прогресс!</div><div class="trend-text">На ${thisTotal-lastTotal} очков больше, чем на прошлой неделе</div></div></div>`;
  } else if (thisTotal < lastTotal && lastTotal > 0) {
    trendHtml = `<div class="trend-card trend-down"><div class="trend-icon">📉</div><div><div class="fw-bold text-red">Можно лучше!</div><div class="trend-text">На ${lastTotal-thisTotal} очков меньше, чем на прошлой неделе</div></div></div>`;
  } else {
    trendHtml = `<div class="trend-card trend-same"><div class="trend-icon">➡️</div><div><div class="fw-bold text-muted">Стабильно</div><div class="trend-text">Такой же результат, как на прошлой неделе</div></div></div>`;
  }

  const metrics = `<div class="metrics-row">
    <div class="metric-card"><div class="metric-num text-accent">${totalConfirmed(child)}</div><div class="metric-label">Выполнено</div></div>
    <div class="metric-card"><div class="metric-num text-gold">${pts}</div><div class="metric-label">Заработано</div></div>
    <div class="metric-card"><div class="metric-num text-orange">${pendingCount(child)}</div><div class="metric-label">Ждут ⏳</div></div>
  </div>`;

  return metrics +
    `<div class="card"><div class="card-title">📊 Очки за неделю</div>${buildWeekChart(weekPts)}</div>` +
    `<div class="card"><div class="card-title">🔍 Динамика</div>${trendHtml}</div>` +
    `<div class="card"><div class="card-title">📂 По категориям</div>${catRows}</div>`;
}

function buildWeekChart(weekPts) {
  const max = Math.max(1, ...weekPts);
  const w=340, h=120, pad=20, barW=32, gap=8;
  const totalW = 7*(barW+gap)-gap;
  const startX = (w-totalW)/2;
  const todayIdx = getTodayIdx();
  const bars = weekPts.map((p,i) => {
    const bH = Math.round((p/max)*(h-pad-20));
    const x = startX + i*(barW+gap), y = h-pad-bH;
    const isToday = i===todayIdx;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${bH}" rx="4" fill="${isToday?'var(--accent)':'var(--bg3)'}" stroke="${isToday?'none':'var(--border)'}" stroke-width="1"/>
      <text x="${x+barW/2}" y="${h-4}" text-anchor="middle" fill="var(--text2)" font-size="10" font-family="sans-serif">${DAY_NAMES[i]}</text>
      ${p>0?`<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" fill="${isToday?'var(--accent)':'var(--text2)'}" font-size="10" font-family="sans-serif" font-weight="bold">${p}</text>`:''}`;
  }).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${bars}</svg></div>`;
}

// ─── REWARDS ───
function buildRewards(child, pts) {
  const lvIdx = getLevel(pts);
  const lvPct = getLevelProgress(pts);
  const levelsHtml = LEVELS.map((lv,i) => {
    const unlocked = lvIdx >= i;
    return `<div class="level-card">
      <div class="level-icon" style="opacity:${unlocked?1:.3}">${lv.icon}</div>
      <div class="level-info"><div class="level-name" style="color:${unlocked?'var(--text)':'var(--text3)'}">${lv.name}</div><div class="level-req">${lv.min===0?'Стартовый':'от '+lv.min+' очков'}</div></div>
      <div>${unlocked?'✅':'🔒'}</div>
    </div>`;
  }).join('');

  const badgesHtml = BADGE_DEFS.map(b => {
    const unlocked = b.check(child);
    return `<div class="badge-item ${unlocked?'':'locked'}"><div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div></div>`;
  }).join('');

  const sharedHtml = state.sharedPrizes.length === 0
    ? `<div class="empty"><div class="empty-text">Нет общих призов</div></div>`
    : state.sharedPrizes.map(p => {
        const avail = pts >= p.pts;
        return `<div class="prize-item">
          <div class="prize-info"><div class="prize-name">🎁 ${p.name}</div><div class="prize-pts">${p.pts} очков</div></div>
          <div class="prize-status ${avail?'status-avail':'status-not'}">${avail?'✅ Доступно':'🔒 Ещё нет'}</div>
        </div>`;
      }).join('');

  const avail = availablePts(child);
  const indHtml = (child.individualPrizes||[]).length === 0
    ? `<div class="empty"><div class="empty-text">Нет личных призов</div></div>`
    : (child.individualPrizes||[]).map(p => {
        if (p.type === 'points') {
          const ok = avail >= p.pts;
          return `<div class="prize-item">
            <div class="prize-info"><div class="prize-name">⭐ ${p.name}</div><div class="prize-pts">${p.pts} очков</div></div>
            <div class="prize-status ${ok?'status-avail':'status-not'}">${ok?'✅ Доступно':'🔒 Ещё нет'}</div>
          </div>`;
        }
        return `<div class="prize-item">
          <div class="prize-info"><div class="prize-name">🎯 ${p.name}</div><div class="prize-pts">Достижение</div></div>
          <div class="prize-status ${p.achieved?'status-avail':'status-not'}">${p.achieved?'✅ Достигнуто':'⏳ В процессе'}</div>
        </div>`;
      }).join('');

  return `<div class="card">
      <div class="card-title">🏆 Уровни</div>
      <div class="level-bar-wrap" style="margin-bottom:12px">
        <div class="level-bar-label"><span>${LEVELS[lvIdx].icon} ${LEVELS[lvIdx].name}</span><span>${lvPct}% до следующего</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${lvPct}%"></div></div>
      </div>${levelsHtml}
    </div>
    <div class="card"><div class="card-title">🏅 Значки</div><div class="badges-grid">${badgesHtml}</div></div>
    <div class="card"><div class="card-title">🎁 Общие призы</div>${sharedHtml}</div>
    <div class="card"><div class="card-title">⭐ Личные призы</div>${indHtml}</div>`;
}

// ─── EXCHANGE ───
function buildExchange(child, pts) {
  const avail = availablePts(child);
  const earned = totalEarned(child);
  const spent  = totalSpent(child);

  const typesHtml = (state.rewardTypes||[]).map(rt => {
    const maxUnits = Math.floor(avail * rt.rate);
    return `<div class="reward-type-card">
      <div class="reward-type-header">
        <div class="reward-type-icon">${rt.icon}</div>
        <div class="reward-type-info">
          <div class="reward-type-name">${rt.name}</div>
          <div class="reward-type-rate">1 балл = ${rt.rate} ${rt.unit}</div>
        </div>
        <div class="reward-type-avail">${maxUnits} ${rt.unit}</div>
      </div>
    </div>`;
  }).join('');

  const exchangesHtml = (child.exchanges||[]).length === 0
    ? `<div class="empty"><div class="empty-text">Обменов ещё не было</div></div>`
    : [...(child.exchanges||[])].reverse().map(ex => {
        const rt = rewardTypeById(ex.rewardTypeId);
        return `<div class="exchange-log-item">
          <span style="font-size:18px">${rt?.icon||'🎁'}</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${rt?.name||'Поощрение'}</div>
          <div style="font-size:11px;color:var(--text2)">${ex.value} ${rt?.unit||''}</div></div>
          <div style="font-size:13px;font-weight:700;color:var(--orange)">−${ex.pts} ⚡</div>
        </div>`;
      }).join('');

  return `<div class="metrics-row">
    <div class="metric-card"><div class="metric-num text-gold">${earned}</div><div class="metric-label">Заработано</div></div>
    <div class="metric-card"><div class="metric-num text-accent">${avail}</div><div class="metric-label">Доступно</div></div>
    <div class="metric-card"><div class="metric-num text-orange">${spent}</div><div class="metric-label">Потрачено</div></div>
  </div>
  <div class="card">
    <div class="card-title">💰 Что можно получить за баллы</div>
    ${typesHtml}
    ${state.parentMode ? `<div class="divider"></div><button class="btn btn-primary btn-block" onclick="openExchange()">💱 Обменять баллы</button>` : '<div style="font-size:12px;color:var(--text2);text-align:center;margin-top:8px">Обмен делает родитель в режиме управления</div>'}
  </div>
  <div class="card">
    <div class="card-title">📋 История обменов</div>
    ${exchangesHtml}
  </div>`;
}

// ═══════════════════════════════════════════════════
// PARENT VIEW
// ═══════════════════════════════════════════════════
function buildParentView() {
  return ui.parentView === 'overview' ? buildParentOverview() : buildParentChildManage();
}

function buildParentOverview() {
  const cards = state.children.map((c,i) => {
    const pts = totalEarned(c);
    const avail = availablePts(c);
    const lv = LEVELS[getLevel(pts)];
    const pCount = pendingCount(c);
    const todayTasks = (c.tasks||[]).filter(t=>(t.weekDays||[]).includes(getTodayIdx()));
    const confToday = todayTasks.filter(t=>t.confirmed).length;
    return `<div class="child-overview-card" onclick="selectChildParent(${i})">
      <div class="child-ov-avatar">${c.avatar}</div>
      <div class="child-ov-info">
        <div class="child-ov-name">${c.name}</div>
        <div class="child-ov-level">${lv.icon} ${lv.name}</div>
        <div class="child-ov-stats">
          <div class="child-ov-stat"><strong>${avail}</strong> доступно</div>
          <div class="child-ov-stat"><strong>${confToday}/${todayTasks.length}</strong> сегодня</div>
        </div>
      </div>
      ${pCount>0?`<div class="pending-badge">⏳ ${pCount}</div>`:''}
      <span style="color:var(--text2)">›</span>
    </div>`;
  }).join('');

  const sharedHtml = state.sharedPrizes.map(p => `<div class="prize-item">
    <div class="prize-info"><div class="prize-name">🎁 ${p.name}</div><div class="prize-pts">${p.pts} очков</div></div>
    <div class="flex-row">
      <button class="btn btn-secondary btn-sm" onclick="openEditPrize('shared',${p.id})">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSharedPrize(${p.id})">🗑️</button>
    </div>
  </div>`).join('') || `<div class="empty"><div class="empty-text">Нет общих призов</div></div>`;

  const rewardTypesHtml = (state.rewardTypes||[]).map(rt => `<div class="prize-item">
    <div class="prize-info">
      <div class="prize-name">${rt.icon} ${rt.name}</div>
      <div class="prize-pts">1 балл = ${rt.rate} ${rt.unit}</div>
    </div>
    <div class="flex-row">
      <button class="btn btn-secondary btn-sm" onclick="openEditRewardType(${rt.id})">✏️</button>
      <button class="btn btn-danger btn-sm"    onclick="deleteRewardType(${rt.id})">🗑️</button>
    </div>
  </div>`).join('') || `<div class="empty"><div class="empty-text">Нет типов поощрений</div></div>`;

  return `<div style="font-size:18px;font-weight:800;margin-bottom:12px">👨‍💼 Обзор детей</div>

function buildParentChildManage() {
  const child = activeChild();
  const avail = availablePts(child);
  const allTasks = child.tasks || [];
  const pendingTasks = allTasks.filter(t=>t.markedDone&&!t.confirmed);

  const confirmSection = pendingTasks.length > 0 ? `<div class="card" style="border-color:var(--orange)">
    <div class="card-title" style="color:var(--orange)">⏳ Ожидают подтверждения (${pendingTasks.length})</div>
    ${pendingTasks.map(t => `<div class="confirm-task-item">
      <div class="task-cat-dot" style="background:${catColor(t.cat)}"></div>
      <div style="flex:1;font-size:14px;font-weight:600">${t.title}</div>
      <span class="task-pts">${t.pts}⚡</span>
      <button class="btn btn-primary btn-sm" onclick="confirmTask(${t.id})">✓</button>
    </div>`).join('')}
    <div class="divider"></div>
    <button class="btn btn-gold btn-block" onclick="confirmAllToday()">✅ Подтвердить все за сегодня</button>
  </div>` : '';

  // Group tasks by days
  const byDay = {};
  allTasks.forEach(t => (t.weekDays||[]).forEach(d => {
    if (!byDay[d]) byDay[d] = [];
    if (!byDay[d].find(x=>x.id===t.id)) byDay[d].push(t);
  }));
  const taskListHtml = Object.keys(byDay).length === 0
    ? `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Нет заданий</div></div>`
    : Object.entries(byDay).sort(([a],[b])=>a-b).map(([day,tasks]) =>
        `<div style="font-size:12px;font-weight:700;color:var(--text2);margin:10px 0 4px">${DAY_NAMES[day]}</div>
        ${tasks.map(t=>buildTaskRow(t,true)).join('')}`
      ).join('');

  const indPrizesHtml = (child.individualPrizes||[]).map(p => `<div class="prize-item">
    <div class="prize-info"><div class="prize-name">${p.type==='goal'?'🎯':'⭐'} ${p.name}</div><div class="prize-pts">${p.type==='points'?p.pts+' очков':'Достижение'}</div></div>
    <div class="flex-row">
      ${p.type==='goal'&&!p.achieved?`<button class="btn btn-primary btn-sm" onclick="markGoalAchieved(${p.id})">Засчитать</button>`:''}
      ${p.achieved?'<span class="prize-status status-avail">✅</span>':''}
      <button class="btn btn-secondary btn-sm" onclick="openEditPrize('individual',${p.id})">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteIndPrize(${p.id})">🗑️</button>
    </div>
  </div>`).join('') || `<div class="empty"><div class="empty-text">Нет личных призов</div></div>`;

  const exchangesHtml = (child.exchanges||[]).length === 0
    ? `<div class="empty"><div class="empty-text">Обменов ещё не было</div></div>`
    : [...(child.exchanges||[])].reverse().map(ex => {
        const rt = rewardTypeById(ex.rewardTypeId);
        return `<div class="exchange-log-item">
          <span style="font-size:18px">${rt?.icon||'🎁'}</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${rt?.name||'Поощрение'}: ${ex.value} ${rt?.unit||''}</div></div>
          <div style="font-size:13px;font-weight:700;color:var(--orange)">−${ex.pts} ⚡</div>
          <button class="btn btn-danger btn-sm" onclick="deleteExchange(${ex.id})">🗑️</button>
        </div>`;
      }).join('');

  return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <button class="btn btn-secondary btn-sm" onclick="backToOverview()">← Назад</button>
    <span style="font-size:16px;font-weight:800">${child.avatar} ${child.name}</span>
    <button class="btn btn-secondary btn-sm" onclick="openEditChild(${state.activeChild})">✏️ Ред.</button>
    ${state.children.length>1?`<button class="btn btn-danger btn-sm" onclick="confirmDeleteChild(${state.activeChild})">🗑️</button>`:''}
  </div>
  <div class="metrics-row">
    <div class="metric-card"><div class="metric-num text-gold">${totalEarned(child)}</div><div class="metric-label">Заработано</div></div>
    <div class="metric-card"><div class="metric-num text-accent">${avail}</div><div class="metric-label">Доступно</div></div>
    <div class="metric-card"><div class="metric-num text-orange">${totalSpent(child)}</div><div class="metric-label">Потрачено</div></div>
  </div>
  ${confirmSection}
  <div class="card"><div class="card-title">🗓️ Неделя</div>${buildWeekGrid(child)}</div>
  <div class="card">
    <div class="card-title">📋 Все задания</div>
    ${taskListHtml}
    <div class="divider"></div>
    <button class="btn btn-primary btn-block" onclick="openAddTask()">➕ Добавить задание</button>
  </div>
  <div class="card">
    <div class="card-title">⭐ Личные призы</div>
    ${indPrizesHtml}
    <div class="divider"></div>
    <button class="btn btn-secondary btn-block" onclick="openAddPrize('individual')">➕ Добавить личный приз</button>
  </div>
  <div class="card">
    <div class="card-title">💱 Обмены баллов</div>
    ${exchangesHtml}
    <div class="divider"></div>
    <button class="btn btn-gold btn-block" onclick="openExchange()">💰 Обменять баллы</button>
  </div>`;
}

function buildModal() {
  if (!ui.modal) return '';
  const content = {
    'pin':             buildPinModal,
    'change-pin':      buildChangePinModal,
    'add-task':        buildAddTaskModal,
    'day-detail':      buildDayDetailModal,
    'add-prize':       buildAddPrizeModal,
    'edit-prize':      buildEditPrizeModal,
    'add-child':       buildAddChildModal,
    'edit-child':      buildEditChildModal,
    'delete-child':    buildDeleteChildModal,
    'add-reward-type': buildAddRewardTypeModal,
    'edit-reward-type':buildEditRewardTypeModal,
    'exchange':        buildExchangeModal,
  }[ui.modal];
  if (!content) return '';
  return `<div class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal" onclick="event.stopPropagation()">${content()}</div>
  </div>`;
}

function buildPinModal() {
  const dots = [0,1,2,3].map(i=>`<div class="pin-dot ${ui.pinInput.length>i?'filled':''}"></div>`).join('');
  const err = ui.pinError ? `<div style="color:var(--red);text-align:center;font-size:13px;margin-top:-10px;margin-bottom:10px">Неверный PIN</div>` : '';
  const keys = [1,2,3,4,5,6,7,8,9,'←',0,'✓'].map(k=>`<div class="pin-key" onclick="pinKey('${k}')">${k}</div>`).join('');

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function setTab(t) { ui.tab = t; render(); }

function switchChild(i) { state.activeChild = i; saveState(); render(); }

function selectChildParent(i) { state.activeChild = i; ui.parentView = 'child'; saveState(); render(); }

function backToOverview() { ui.parentView = 'overview'; render(); }

function openPin() { ui.modal = 'pin'; ui.pinInput = ''; ui.pinError = false; render(); }

function pinKey(k) {
  if (k === '←') { ui.pinInput = ui.pinInput.slice(0,-1); }
  else if (k === '✓') { submitPin(); return; }
  else if (ui.pinInput.length < 4) {
    ui.pinInput += k;
    if (ui.pinInput.length === 4) { render(); setTimeout(submitPin,100); return; }
  }
  render();
}

function submitPin() {
  if (ui.pinInput === state.parentPin) {
    state.parentMode = true; ui.modal = null; ui.pinInput = '';
    ui.tab = 'parent'; ui.parentView = 'overview';
    saveState(); render(); showToast('✅ Режим родителя активирован');
  } else {
    ui.pinError = true; ui.pinInput = ''; render();
  }
}

function exitParent() {
  state.parentMode = false; ui.modal = null; ui.tab = 'today';
  saveState(); render(); showToast('Режим ребёнка активирован');
}

function openChangePin() { ui.modal = 'change-pin'; render(); }

function savePin() {
  const val = document.getElementById('new-pin-input')?.value;
  if (!val || val.length !== 4 || !/^\d+$/.test(val)) { showToast('⚠️ PIN должен быть 4 цифры'); return; }
  state.parentPin = val; saveState(); closeModal(); showToast('✅ PIN изменён');
}

// Tasks
function openAddTask() {
  ui.addTaskForm = { title:'', cat:'sport', pts:10, weekDays:[...ALL_DAYS] };
  ui.modal = 'add-task'; render();
}

function selectPts(p) { ui.addTaskForm.pts = p; render(); }

function toggleDay(i) {
  const days = ui.addTaskForm.weekDays || [];
  const idx = days.indexOf(i);
  if (idx >= 0) days.splice(idx,1); else days.push(i);
  ui.addTaskForm.weekDays = days; render();
}

function setDaysPreset(preset) {
  if (preset === 'all')     ui.addTaskForm.weekDays = [...ALL_DAYS];
  else if (preset === 'week')    ui.addTaskForm.weekDays = [...WEEKDAYS];
  else if (preset === 'weekend') ui.addTaskForm.weekDays = [...WEEKENDS];
  else ui.addTaskForm.weekDays = [];
  render();
}

function saveTask() {
  const title = document.getElementById('task-title')?.value?.trim();
  if (!title) { showToast('⚠️ Введите название задания'); return; }
  const weekDays = [...(ui.addTaskForm.weekDays||[])].sort();
  if (weekDays.length === 0) { showToast('⚠️ Выберите хотя бы один день'); return; }
  const cat = document.getElementById('task-cat')?.value;
  const child = activeChild();
  child.tasks.push({ id: newId(), title, cat, pts: ui.addTaskForm.pts, weekDays, markedDone: false, confirmed: false, fromParent: state.parentMode });
  saveState(); closeModal(); showToast('✅ Задание добавлено');
}

function markDone(id) {
  const task = activeChild().tasks.find(t=>t.id===id);
  if (task && !task.markedDone) { task.markedDone = true; saveState(); render(); showToast('⏳ Ждёт подтверждения родителя'); }
}

function deleteTask(id) {
  const child = activeChild();
  child.tasks = child.tasks.filter(t=>t.id!==id);
  saveState(); render(); showToast('🗑️ Задание удалено');
}

function confirmTask(id) {
  const child = activeChild();
  const task = child.tasks.find(t=>t.id===id);
  if (task && task.markedDone && !task.confirmed) {
    task.confirmed = true;
    const day = getTodayIdx();
    if (!child.weekPts) child.weekPts = [0,0,0,0,0,0,0];
    child.weekPts[day] = (child.weekPts[day]||0) + task.pts;
    saveState(); render(); showToast(`✅ +${task.pts} очков!`);
  }
}

function confirmAllToday() {
  const child = activeChild();
  const today = getTodayIdx();
  const key = `w-${today}`;
  let added = 0;
  (child.tasks||[]).forEach(t => {
    if ((t.weekDays||[]).includes(today) && t.markedDone && !t.confirmed) {
      t.confirmed = true;
      if (!child.weekPts) child.weekPts = [0,0,0,0,0,0,0];
      child.weekPts[today] = (child.weekPts[today]||0) + t.pts;
      added += t.pts;
    }
  });
  child.confirmedDays[key] = true;
  saveState(); closeModal(); render();
  if (added > 0) showToast(`✅ День подтверждён! +${added} очков`);
}

function confirmDay(day) {
  const child = activeChild();
  const key = `w-${day}`;
  let added = 0;
  (child.tasks||[]).forEach(t => {
    if ((t.weekDays||[]).includes(day) && t.markedDone && !t.confirmed) {
      t.confirmed = true;
      if (!child.weekPts) child.weekPts = [0,0,0,0,0,0,0];
      child.weekPts[day] = (child.weekPts[day]||0) + t.pts;
      added += t.pts;
    }
  });
  child.confirmedDays[key] = true;
  saveState(); closeModal(); render();
  if (added > 0) showToast(`✅ +${added} очков!`);
}

function openDayDetail(day) { ui.selectedDay = day; ui.modal = 'day-detail'; render(); }

// Prizes
function openAddPrize(type) {
  ui.editPrizeType = type; ui.addPrizeForm = { name:'', pts:100, type:'points', alsoForChildren:[] };
  ui.modal = 'add-prize'; render();
}

function setPrizeType(t) {
  const nameEl = document.getElementById('prize-name'), ptsEl = document.getElementById('prize-pts');
  if (nameEl) ui.addPrizeForm.name = nameEl.value;
  if (ptsEl) ui.addPrizeForm.pts = parseInt(ptsEl.value)||ui.addPrizeForm.pts;
  ui.addPrizeForm.type = t; render();
}

function toggleAlsoForChild(i) {
  const nameEl = document.getElementById('prize-name'), ptsEl = document.getElementById('prize-pts');
  if (nameEl) ui.addPrizeForm.name = nameEl.value;
  if (ptsEl) ui.addPrizeForm.pts = parseInt(ptsEl.value)||ui.addPrizeForm.pts;
  const arr = ui.addPrizeForm.alsoForChildren || (ui.addPrizeForm.alsoForChildren=[]);
  const idx = arr.indexOf(i);
  if (idx>=0) arr.splice(idx,1); else arr.push(i);
  render();
}

function savePrize() {
  const name = document.getElementById('prize-name')?.value?.trim();
  if (!name) { showToast('⚠️ Введите название'); return; }
  if (ui.editPrizeType === 'shared') {
    const pts = parseInt(document.getElementById('prize-pts')?.value)||100;
    state.sharedPrizes.push({ id:newId(), pts, name });
  } else {
    const type = document.getElementById('prize-type')?.value||'points';
    const pts = type==='points'?(parseInt(document.getElementById('prize-pts')?.value)||100):0;
    const child = activeChild();
    if (!child.individualPrizes) child.individualPrizes = [];
    child.individualPrizes.push({ id:newId(), name, pts, type, achieved:false });
    (ui.addPrizeForm.alsoForChildren||[]).forEach(idx => {
      const c = state.children[idx];
      if (c) {
        if (!c.individualPrizes) c.individualPrizes = [];
        c.individualPrizes.push({ id:newId(), name, pts, type, achieved:false });
      }
    });
  }
  saveState(); closeModal(); showToast('🎁 Приз добавлен');
}

function deleteSharedPrize(id) { state.sharedPrizes = state.sharedPrizes.filter(p=>p.id!==id); saveState(); render(); }

function deleteIndPrize(id) {
  const child = activeChild();
  child.individualPrizes = (child.individualPrizes||[]).filter(p=>p.id!==id);
  saveState(); render();
}

function openEditPrize(scope, id) {
  if (scope === 'shared') {
    const p = state.sharedPrizes.find(x=>x.id===id);
    if (!p) return;
    ui.editPrizeForm = { id, scope, name:p.name, pts:p.pts };
  } else {
    const p = (activeChild().individualPrizes||[]).find(x=>x.id===id);
    if (!p) return;
    ui.editPrizeForm = { id, scope, name:p.name, pts:p.pts, type:p.type };
  }
  ui.modal = 'edit-prize'; render();
}

function doEditPrize() {
  const name = document.getElementById('ep-name')?.value?.trim();
  if (!name) { showToast('⚠️ Введите название'); return; }
  const f = ui.editPrizeForm;
  if (f.scope === 'shared') {
    const pts = parseInt(document.getElementById('ep-pts')?.value)||f.pts;
    const p = state.sharedPrizes.find(x=>x.id===f.id);
    if (p) { p.name = name; p.pts = pts; }
  } else {
    const p = (activeChild().individualPrizes||[]).find(x=>x.id===f.id);
    if (p) {
      p.name = name;
      if (p.type === 'points') p.pts = parseInt(document.getElementById('ep-pts')?.value)||p.pts;
    }
  }
  saveState(); closeModal(); render(); showToast('✅ Приз обновлён');
}

function markGoalAchieved(id) {
  const prize = (activeChild().individualPrizes||[]).find(p=>p.id===id);
  if (prize) { prize.achieved = true; saveState(); render(); showToast('🎯 Достижение засчитано!'); }
}

// Children
function openAddChild() { ui.addChildForm = { name:'', avatar:'⚽' }; ui.modal = 'add-child'; render(); }

function openEditChild(idx) {
  const c = state.children[idx];
  ui.editChildForm = { id:idx, name:c.name, avatar:c.avatar };
  ui.modal = 'edit-child'; render();
}

function selectAvatar(e, mode) {
  if (mode === 'add') ui.addChildForm.avatar = e;
  else ui.editChildForm.avatar = e;
  render();
}

function saveChild() {
  const name = document.getElementById('child-name')?.value?.trim();
  if (!name) { showToast('⚠️ Введите имя'); return; }
  state.children.push({ id:newId(), name, avatar:ui.addChildForm.avatar, tasks:[], confirmedDays:{}, weekPts:[0,0,0,0,0,0,0], individualPrizes:[], exchanges:[] });
  state.activeChild = state.children.length - 1;
  saveState(); closeModal(); render(); showToast(`✅ Профиль ${name} создан`);
}

function saveEditChild() {
  const name = document.getElementById('edit-child-name')?.value?.trim();
  if (!name) { showToast('⚠️ Введите имя'); return; }
  const c = state.children[ui.editChildForm.id];
  c.name = name; c.avatar = ui.editChildForm.avatar;
  saveState(); closeModal(); render(); showToast('✅ Профиль обновлён');
}

function confirmDeleteChild(idx) { ui.deleteChildId = idx; ui.modal = 'delete-child'; render(); }

function doDeleteChild() {
  const idx = ui.deleteChildId;
  state.children.splice(idx, 1);
  state.activeChild = Math.min(state.activeChild, state.children.length - 1);
  saveState(); closeModal();
  ui.parentView = 'overview'; render(); showToast('🗑️ Профиль удалён');
}

// Reward types
function openAddRewardType() { ui.addRewardTypeForm = { name:'', icon:'💰', unit:'тенге', rate:10 }; ui.modal = 'add-reward-type'; render(); }

function selectRewardIcon(e, mode) {
  if (mode==='add') ui.addRewardTypeForm.icon = e;
  else ui.editRewardTypeForm.icon = e;
  render();
}

function saveRewardType() {
  const name = document.getElementById('rt-name')?.value?.trim();
  const unit = document.getElementById('rt-unit')?.value?.trim();
  const rate = parseFloat(document.getElementById('rt-rate')?.value)||1;
  if (!name || !unit) { showToast('⚠️ Заполните все поля'); return; }
  if (!state.rewardTypes) state.rewardTypes = [];
  state.rewardTypes.push({ id:newId(), name, icon:ui.addRewardTypeForm.icon, unit, rate });
  saveState(); closeModal(); render(); showToast('✅ Тип поощрения добавлен');
}

function openEditRewardType(id) {
  const rt = rewardTypeById(id);
  if (!rt) return;
  ui.editRewardTypeForm = { ...rt };
  ui.modal = 'edit-reward-type'; render();
}

function doEditRewardType() {
  const name = document.getElementById('ert-name')?.value?.trim();
  const unit = document.getElementById('ert-unit')?.value?.trim();
  const rate = parseFloat(document.getElementById('ert-rate')?.value)||1;
  if (!name || !unit) { showToast('⚠️ Заполните все поля'); return; }
  const rt = rewardTypeById(ui.editRewardTypeForm.id);
  if (rt) { rt.name = name; rt.unit = unit; rt.rate = rate; rt.icon = ui.editRewardTypeForm.icon; }
  saveState(); closeModal(); render(); showToast('✅ Поощрение обновлено');
}

function deleteRewardType(id) {
  state.rewardTypes = (state.rewardTypes||[]).filter(r=>r.id!==id);
  saveState(); render(); showToast('🗑️ Удалено');
}

// Exchange
function openExchange() {
  const rt = (state.rewardTypes||[])[0];
  ui.exchangeForm = { rewardTypeId:rt?.id||null, pts:10 };
  ui.modal = 'exchange'; render();
}

function setExchangeType(id) { ui.exchangeForm.rewardTypeId = parseInt(id); render(); }

function updateExchangePreview(val) { ui.exchangeForm.pts = parseInt(val)||0; render(); }

function doExchange() {
  const child = activeChild();
  const avail = availablePts(child);
  const pts = parseInt(document.getElementById('exchange-pts')?.value)||0;
  if (pts <= 0) { showToast('⚠️ Введите количество баллов'); return; }
  if (pts > avail) { showToast(`⚠️ Недостаточно баллов (доступно ${avail})`); return; }
  const rt = rewardTypeById(ui.exchangeForm.rewardTypeId);
  if (!rt) { showToast('⚠️ Выберите тип поощрения'); return; }
  const value = parseFloat((pts * rt.rate).toFixed(2));
  if (!child.exchanges) child.exchanges = [];
  child.exchanges.push({ id:newId(), rewardTypeId:rt.id, pts, value, date: new Date().toISOString() });
  saveState(); closeModal(); render();
  showToast(`💰 Обменяно: ${pts} баллов → ${value} ${rt.unit}`);
}

function deleteExchange(id) {
  const child = activeChild();
  child.exchanges = (child.exchanges||[]).filter(e=>e.id!==id);
  saveState(); render(); showToast('🗑️ Обмен отменён');
}

function closeModal() { ui.modal = null; render(); }

function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }

let toastTimer = null;
function showToast(msg) {
  document.querySelector('.toast')?.remove();
  if (toastTimer) clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2500);
}

Object.assign(window, {
  setTab, switchChild, selectChildParent, backToOverview,
  openPin, pinKey, exitParent, openChangePin, savePin,
  openAddTask, selectPts, toggleDay, setDaysPreset, saveTask,
  markDone, deleteTask, confirmTask, confirmAllToday, confirmDay, openDayDetail,
  openAddPrize, setPrizeType, toggleAlsoForChild, savePrize, deleteSharedPrize, deleteIndPrize, markGoalAchieved,
  openEditPrize, doEditPrize,
  openAddChild, openEditChild, selectAvatar, saveChild, saveEditChild,
  confirmDeleteChild, doDeleteChild,
  openAddRewardType, selectRewardIcon, saveRewardType,
  openEditRewardType, doEditRewardType, deleteRewardType,
  openExchange, setExchangeType, updateExchangePreview, doExchange, deleteExchange,
  closeModal, handleOverlayClick,
});

render();
</script>
</body>
</html>
